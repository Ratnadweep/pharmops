name: Build and Push Docker Images to ECR

on:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest

    steps:
      # Checkout source code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Configure AWS credentials using GitHub Secrets
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # Login to Amazon ECR
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Setup Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Generate image tag
      - name: Set Image Tag
        run: |
          echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV
          echo "AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)" >> $GITHUB_ENV
          echo "REGISTRY=$(aws sts get-caller-identity --query Account --output text).dkr.ecr.${AWS_REGION}.amazonaws.com" >> $GITHUB_ENV

      ####################################################################
      # API GATEWAY
      ####################################################################

      - name: Build and Push api-gateway
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -t ${REGISTRY}/api-gateway:${IMAGE_TAG} \
            --push \
            services/api-gateway

      ####################################################################
      # AUTH SERVICE
      ####################################################################

      - name: Build and Push auth-service
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -t ${REGISTRY}/auth-service:${IMAGE_TAG} \
            --push \
            services/auth-service

      ####################################################################
      # DRUG CATALOG SERVICE
      ####################################################################

      - name: Build and Push drug-catalog-service
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -t ${REGISTRY}/drug-catalog-service:${IMAGE_TAG} \
            --push \
            services/drug-catalog-service

      ####################################################################
      # NOTIFICATION SERVICE
      ####################################################################

      - name: Build and Push notification-service
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -t ${REGISTRY}/notification-service:${IMAGE_TAG} \
            --push \
            services/notification-service

      ####################################################################
      # PHARMA UI
      ####################################################################

      - name: Build and Push pharma-ui
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -t ${REGISTRY}/pharma-ui:${IMAGE_TAG} \
            --push \
            services/pharma-ui

      ####################################################################
      # SUMMARY
      ####################################################################

      - name: Print Image Summary
        run: |
          echo "Images pushed successfully:"
          echo "${REGISTRY}/api-gateway:${IMAGE_TAG}"
          echo "${REGISTRY}/auth-service:${IMAGE_TAG}"
          echo "${REGISTRY}/drug-catalog-service:${IMAGE_TAG}"
          echo "${REGISTRY}/notification-service:${IMAGE_TAG}"
          echo "${REGISTRY}/pharma-ui:${IMAGE_TAG}"